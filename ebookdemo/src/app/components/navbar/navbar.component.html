<nav class="navbar">
  <div class="navbar-container">
    <h1 class="logo" (click)="goToHome()">📚 電子書商城</h1>

    <div class="nav-links">
      <a href="/" class="nav-link">首頁</a>

      <ng-container *ngIf="currentUser$ | async as user">
        <!-- 買家 / 所有登入用戶可看「我的書籍」 -->
        <a href="/my-books" class="nav-link">我的書籍</a>
        <a href="/orders" class="nav-link">我的訂單</a>
        <a href="/wallet" class="nav-link">錢包</a>

        <ng-container [ngSwitch]="user.role">
          <a *ngSwitchCase="UserRole.SELLER" href="/seller" class="nav-link">出版商後台</a>
          <a *ngSwitchCase="UserRole.ADMIN" href="/admin" class="nav-link">管理後台</a>
        </ng-container>
      </ng-container>

      <ng-container *ngIf="!(currentUser$ | async)">
        <a href="/orders" class="nav-link">我的訂單</a>
      </ng-container>
    </div>

    <div class="navbar-right">
      <button class="cart-btn" (click)="goToCart()">🛒 購物車（{{ cartItemCount }}）</button>

      <ng-container *ngIf="currentUser$ | async as user; else notLoggedIn">
        <div class="user-info">
          <span class="username">{{ user.username }}</span>
          <button class="logout-btn" (click)="logout()">登出</button>
        </div>
      </ng-container>

      <ng-template #notLoggedIn>
        <div class="auth-links">
          <a href="/login" class="auth-link login">登入</a>
          <a href="/register" class="auth-link register">註冊</a>
        </div>
      </ng-template>
    </div>
  </div>
</nav>
