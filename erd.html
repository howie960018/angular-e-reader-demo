<!DOCTYPE html>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #eef0f3; font-family: 'Segoe UI', Arial, sans-serif; padding: 20px; }

#svg { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; }

.entity { position: absolute; border-radius: 5px; overflow: hidden; z-index: 2; background: white; width: 236px; box-shadow: 0 1px 6px rgba(0,0,0,0.13); border: 1px solid #c8cdd5; transition: box-shadow 0.1s; }

.entity.dragging .eh { cursor: grabbing; }
.en { font-weight: 700; font-size: 12px; display:block; }
.et { font-size: 9.5px; opacity: 0.78; display:block; margin-top:1px; }

.ef { background: white; }

.pk { background:#f0c040; color:#5a4200; }
.fk { background:#a8d8f0; color:#1a4a6a; }
.uk { background:#b8f0b8; color:#1a5a1a; }

.fn { flex:1; color:#222; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.cu { background:#c0392b; }
.cb { background:#2471a3; }
.cg { background:#1a8a6a; }
.cs { background:#229954; }

.leg { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; padding:9px 14px; background:#f8f9fa; border-radius:8px; border:1px solid #dee2e6; font-size:10.5px; align-items:center; }

.ld { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
.sep { height:13px; width:1px; background:#ccc; margin:0 4px; }

const canvas = document.getElementById('canvas');

// 拖曳狀態管理
let draggedEl = null;
let draggedId = null;
let startX, startY, initialX, initialY;

function bindDrag(el, id) {
  const header = el.querySelector('.eh');
  header.addEventListener('mousedown', (e) => {
    draggedEl = el;
    draggedId = id;
    startX = e.clientX;
    startY = e.clientY;
    initialX = EMETA[id].x;
    initialY = EMETA[id].y;
    el.classList.add('dragging');
  });
}

document.addEventListener('mousemove', (e) => {
  if (!draggedEl) return;
  const dx = e.clientX - startX;
  const dy = e.clientY - startY;
  EMETA[draggedId].x = initialX + dx;
  EMETA[draggedId].y = initialY + dy;
  draggedEl.style.left = EMETA[draggedId].x + 'px';
  draggedEl.style.top = EMETA[draggedId].y + 'px';
  drawAllRels(); // 拖曳時即時重繪
});

document.addEventListener('mouseup', () => {
  if (draggedEl) {
    draggedEl.classList.remove('dragging');
    draggedEl = null;
    draggedId = null;
  }
});

function renderEntity(id) {
  const def = EMETA[id];
  const div = document.createElement('div');
  div.className = 'entity'; div.id = 'e-' + id;
  div.style.left = def.x + 'px'; div.style.top = def.y + 'px';
  let html = `<div class="eh ${def.c}"><span class="en">${def.n}</span><span class="et">${def.t}</span></div><div class="ef">`;
  for (const f of (EFIELDS[id] || [])) {
    if (f.n === '—' && f.k === 'uk') {
      html += `<div class="fr fnote">🔒 ${f.t}</div>`;
    } else {
      const bd = f.k === 'pk' ? '<span class="b pk">PK</span>'
               : f.k === 'fk' ? '<span class="b fk">FK</span>'
               : f.k === 'uk' ? '<span class="b uk">UK</span>'
               : '<span class="eb"></span>';
      html += `<div class="fr">${bd}<span class="fn">${f.n}</span><span class="ft">${f.t}</span></div>`;
    }
  }
  html += '</div>';
  div.innerHTML = html;
  canvas.appendChild(div);
  bindDrag(div, id); // 綁定拖曳功能
}

Object.keys(EMETA).forEach(renderEntity);

function bnd(id) {
  const e = EMETA[id], el = document.getElementById('e-' + id);
  return { x: e.x, y: e.y, w: el.offsetWidth || EW, h: el.offsetHeight || 80 };
}

function cp(id, side, off = 0.5) {
  const b = bnd(id);
  if (side === 'L') return [b.x,       b.y + b.h * off];
  if (side === 'R') return [b.x + b.w, b.y + b.h * off];
  if (side === 'T') return [b.x + b.w * off, b.y];
  if (side === 'B') return [b.x + b.w * off, b.y + b.h];
}

const COL = {
  app_user:'#c0392b', book:'#2471a3', cart:'#229954', cart_item:'#229954',
  book_order:'#7d3c98', wallet:'#148f77', top_up_code:'#ba6a10', top_up_code_usage:'#ba6a10',
  platform_wallet:'#2c3e50', publisher_wallet:'#1a6b4a', revenue_share:'#cb4335',
};

// 移除寫死的座標，改為完全動態的路由
function makePath(r) {
  const [x1,y1] = cp(r.from, r.fS, r.fO);
  const [x2,y2] = cp(r.to,   r.tS, r.tO);
  
  // 動態計算中繼點
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;

  switch (r.rt) {
    case 'HVH': return `M${x1},${y1} H${mx} V${y2} H${x2}`;
    case 'VHV': return `M${x1},${y1} V${my} H${x2} V${y2}`;
    case 'HV':  return `M${x1},${y1} H${x2} V${y2}`;
    case 'VH':  return `M${x1},${y1} V${y2} H${x2}`;
    default:    return `M${x1},${y1} H${mx} V${y2} H${x2}`;
  }
}

const svg = document.getElementById('svg');
let defsCached = null;

function getDefs() {
  if (defsCached) return defsCached;
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  const done = new Set();
  RELS.forEach(r => {
    if (done.has(r.from)) return; done.add(r.from);
    const col = COL[r.from] || '#999';

    const am = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    am.setAttribute('id',         `arr-${r.from}`);
    am.setAttribute('markerWidth','10'); am.setAttribute('markerHeight','7');
    am.setAttribute('refX',       '9'); am.setAttribute('refY',       '3.5');
    am.setAttribute('orient',     'auto');
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', '0 0, 10 3.5, 0 7'); poly.setAttribute('fill', col);
    am.appendChild(poly); defs.appendChild(am);

    const tm = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
    tm.setAttribute('id',         `tick-${r.from}`);
    tm.setAttribute('markerWidth','8'); tm.setAttribute('markerHeight','10');
    tm.setAttribute('refX',       '1'); tm.setAttribute('refY',       '5');
    tm.setAttribute('orient',     'auto');
    const tl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    tl.setAttribute('x1','1'); tl.setAttribute('y1','1'); tl.setAttribute('x2','1'); tl.setAttribute('y2','9');
    tl.setAttribute('stroke', col); tl.setAttribute('stroke-width','1.8');
    tm.appendChild(tl); defs.appendChild(tm);
  });
  defsCached = defs;
  return defs;
}

function pathMid(d) {
  const segs = [];
  let cx = 0, cy = 0;
  const re = /([MLHVmlhv])\s*([-\d.]+)(?:\s*,\s*([-\d.]+))?/g;
  let m;
  while ((m = re.exec(d)) !== null) {
    const [, type, a, b] = m;
    const px = cx, py = cy;
    if      (type==='M'||type==='m') { cx=+a; cy=+b; }
    else if (type==='L'||type==='l') { cx=+a; cy=+b; }
    else if (type==='H'||type==='h') { cx=+a; }
    else if (type==='V'||type==='v') { cy=+a; }
    if (type!=='M'&&type!=='m') segs.push([px,py,cx,cy]);
  }
  let total = segs.reduce((s,[x1,y1,x2,y2]) => s + Math.abs(x2-x1)+Math.abs(y2-y1), 0);
  let half = total/2, acc = 0;
  for (const [x1,y1,x2,y2] of segs) {
    const len = Math.abs(x2-x1)+Math.abs(y2-y1);
    if (acc+len >= half) {
      const t = len === 0 ? 0 : (half-acc)/len;
      return [x1+(x2-x1)*t, y1+(y2-y1)*t];
    }
    acc += len;
  }
  return [cx, cy];
}

function drawRel(r) {
  const d   = makePath(r);
  const col = COL[r.from] || '#999';

  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('d', d); path.setAttribute('fill', 'none');
  path.setAttribute('stroke', col); path.setAttribute('stroke-width', '1.6');
  path.setAttribute('stroke-opacity', '0.82');

  if (r.card === '1:1') path.setAttribute('stroke-dasharray', '4,3');
  else path.setAttribute('stroke-dasharray', '6,3');

  path.setAttribute('marker-end', `url(#arr-${r.from})`);
  if (r.card === '1:1') path.setAttribute('marker-start', `url(#tick-${r.from})`);
  svg.appendChild(path);

  const [lx, ly] = pathMid(d);
  const bg  = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  const txt = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  txt.setAttribute('x', lx); txt.setAttribute('y', ly-4);
  txt.setAttribute('text-anchor', 'middle');
  txt.setAttribute('font-size', '9'); txt.setAttribute('font-weight', '600');
  txt.setAttribute('fill', col);
  txt.textContent = r.card + ' ' + r.lbl;
  
  svg.appendChild(bg); svg.appendChild(txt);

  // 同步精算背景標籤大小 (避免拖曳時的非同步延遲)
  const bbWidth = txt.textContent.length * 5.5 + 4; // 近似寬度
  bg.setAttribute('x', lx - bbWidth/2);
  bg.setAttribute('y', ly - 13);
  bg.setAttribute('width', bbWidth);
  bg.setAttribute('height', 12);
  bg.setAttribute('fill', 'white');
  bg.setAttribute('fill-opacity', '0.92');
  bg.setAttribute('rx', '2');
  svg.insertBefore(bg, txt);
}

function drawAllRels() {
  svg.replaceChildren(getDefs()); // 快速清空並重加 defs
  RELS.forEach(drawRel);
}

window.addEventListener('load', () => {
  svg.setAttribute('width',  canvas.offsetWidth);
  svg.setAttribute('height', canvas.offsetHeight);
  drawAllRels();
});
</script>
</body>
</html>
